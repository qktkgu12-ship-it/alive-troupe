<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#111317" />
<title>극단 ALIVE 팜플렛</title>
<style>
  /* ===== 기본 리셋 ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;                 /* 페이지 자체 스크롤 막기 */
    background: #111317;              /* 레터박스 배경(여백 색) */
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    overscroll-behavior: none;
    color: #fff;
  }
  body { position: fixed; inset: 0; }

  /* ===== 슬라이더 ===== */
  #viewport {
    position: absolute; inset: 0;
    overflow: hidden;
    touch-action: none;               /* 스와이프·확대를 직접 제어 */
  }
  #track {
    display: flex;
    height: 100%;
    will-change: transform;
  }
  .slide {
    flex: 0 0 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* 이미지 원본 비율(약 1 : 1.4)을 유지하며 화면 안에 '전체가 다 보이게' */
  .page {
    max-width: 100%;
    max-height: 100%;
    width: auto; height: auto;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;             /* 터치는 viewport가 처리 */
    background: #fff;
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
    display: block;
    transform-origin: center center;
  }

  /* ===== 페이지 표시(1 / 15) ===== */
  #counter {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
    left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: .5px;
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    z-index: 5;
    transition: opacity .4s;
  }

  /* ===== 첫 화면 안내 오버레이 ===== */
  #intro {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px;
    background: rgba(10,11,13,.72);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 20;
    text-align: center;
    padding: 24px;
    transition: opacity .6s ease;
  }
  #intro.hide { opacity: 0; pointer-events: none; }
  .intro-icon { font-size: 40px; animation: swipeHint 1.6s ease-in-out infinite; }
  @keyframes swipeHint {
    0%, 100% { transform: translateX(-10px); opacity: .55; }
    50%      { transform: translateX(10px);  opacity: 1; }
  }
  .intro-title { font-size: 18px; font-weight: 700; line-height: 1.5; }
  .intro-sub { font-size: 14px; line-height: 1.7; color: #c9ccd2; }

  /* 데스크톱 좌우 화살표 버튼(모바일에선 숨김) */
  .nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px;
    border: none; border-radius: 50%;
    background: rgba(0,0,0,.4);
    color: #fff; font-size: 22px;
    cursor: pointer; z-index: 6;
    display: none;
    align-items: center; justify-content: center;
    transition: background .2s, opacity .3s;
  }
  .nav-btn:hover { background: rgba(0,0,0,.7); }
  .nav-btn[disabled] { opacity: .25; cursor: default; }
  #prev { left: 14px; }
  #next { right: 14px; }
  @media (hover: hover) and (pointer: fine) {
    .nav-btn { display: flex; }
  }
</style>
</head>
<body>
  <div id="viewport">
    <div id="track"></div>
  </div>

  <button id="prev" class="nav-btn" aria-label="이전">‹</button>
  <button id="next" class="nav-btn" aria-label="다음">›</button>

  <div id="counter">1 / 15</div>

  <div id="intro">
    <div class="intro-icon">👆</div>
    <div class="intro-title">좌우로 넘겨보세요</div>
    <div class="intro-sub">두 번 톡 두드리면 확대 · 화면을 누르면 시작</div>
  </div>

<script>
/* =========================================================
   설정
   - 이미지 파일명: images/01.png ~ images/15.png
   - 이미지가 없으면 번호가 적힌 가짜 페이지가 보입니다.
   ========================================================= */
const PAGE_COUNT = 15;
const IMG_PATH   = (n) => `/pamphlet/images/${String(n).padStart(2, "0")}.webp`;
const MAX_SCALE  = 4;     // 최대 확대 배율

const track    = document.getElementById("track");
const viewport = document.getElementById("viewport");
const counter  = document.getElementById("counter");
const intro    = document.getElementById("intro");
const prevBtn  = document.getElementById("prev");
const nextBtn  = document.getElementById("next");

let index  = 0;     // 현재 페이지(0부터)
let scale  = 1;     // 현재 페이지 확대 배율
let tx = 0, ty = 0; // 확대 시 이동량

/* ---------- 슬라이드 만들기 ---------- */
function placeholder(n) {
  const svg = `
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 1414'>
    <rect width='1000' height='1414' fill='#ffffff'/>
    <rect x='2' y='2' width='996' height='1410' fill='none' stroke='#dfe3ea' stroke-width='4'/>
    <text x='500' y='690' font-size='150' fill='#c3c9d4' text-anchor='middle' font-family='sans-serif' font-weight='700'>${n}</text>
    <text x='500' y='800' font-size='46' fill='#d7dce4' text-anchor='middle' font-family='sans-serif'>PAGE ${n} / ${PAGE_COUNT}</text>
  </svg>`;
  return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

for (let i = 1; i <= PAGE_COUNT; i++) {
  const slide = document.createElement("div");
  slide.className = "slide";
  const img = document.createElement("img");
  img.className = "page";
  img.alt = `${i}페이지`;
  img.decoding = "async";
  img.loading = i <= 2 ? "eager" : "lazy";
  img.src = IMG_PATH(i);
  img.onerror = () => { img.onerror = null; img.src = placeholder(i); };
  slide.appendChild(img);
  track.appendChild(slide);
}

/* ---------- 보조 함수 ---------- */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist  = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const mid   = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
function currentImg() { return track.children[index].querySelector("img"); }

/* ---------- 페이지 위치 ---------- */
let dragDX = 0;
function setTransform(animate) {
  const w = viewport.clientWidth;
  const x = -index * w + dragDX;
  track.style.transition = animate ? "transform .38s cubic-bezier(.22,.61,.36,1)" : "none";
  track.style.transform = `translateX(${x}px)`;
}
function update() {
  counter.textContent = `${index + 1} / ${PAGE_COUNT}`;
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === PAGE_COUNT - 1;
}

/* ---------- 확대 적용 ---------- */
function applyZoom(animate) {
  const img = currentImg();
  img.style.transition = animate ? "transform .3s ease" : "none";
  img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}
function clampPan() {
  const img = currentImg();
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const maxX = Math.max(0, (img.clientWidth  * scale - vw) / 2);
  const maxY = Math.max(0, (img.clientHeight * scale - vh) / 2);
  tx = clamp(tx, -maxX, maxX);
  ty = clamp(ty, -maxY, maxY);
}
function resetZoom(animate) {
  scale = 1; tx = 0; ty = 0;
  applyZoom(animate);
}

function goTo(i, animate = true) {
  const leaving = currentImg();
  if (leaving) { leaving.style.transition = "none"; leaving.style.transform = ""; } // 떠나는 페이지 확대 해제
  index = clamp(i, 0, PAGE_COUNT - 1);
  scale = 1; tx = 0; ty = 0; dragDX = 0;
  setTransform(animate);
  update();
}

/* ---------- 더블탭 확대 ---------- */
function toggleZoom(px, py) {
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  if (scale > 1) {
    resetZoom(true);
  } else {
    scale = 2.5;
    tx = (px - vw / 2) * (1 - scale);
    ty = (py - vh / 2) * (1 - scale);
    clampPan();
    applyZoom(true);
  }
}

/* ---------- 포인터(터치 + 마우스) ---------- */
const pointers = new Map();   // id -> {x,y,downX,downY,downT}
let pinch = null;             // {dist, mid}
let panStart = null;          // 확대 상태 한 손가락 이동
let swiping = false;          // 보통 상태 좌우 스와이프
let startX = 0;
let lastTap = 0, lastTapX = 0, lastTapY = 0;

viewport.addEventListener("pointerdown", (e) => {
  viewport.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, downX: e.clientX, downY: e.clientY, downT: performance.now(), introOpen: !introHidden });
  hideIntro();

  if (pointers.size === 2) {
    const p = [...pointers.values()];
    pinch = { dist: dist(p[0], p[1]), mid: mid(p[0], p[1]) };
    swiping = false; panStart = null;
    dragDX = 0; setTransform(false);
  } else if (pointers.size === 1) {
    if (scale > 1) {
      panStart = { x: e.clientX, y: e.clientY, tx, ty };
    } else {
      swiping = true; startX = e.clientX; dragDX = 0;
    }
  }
});

viewport.addEventListener("pointermove", (e) => {
  const d = pointers.get(e.pointerId);
  if (!d) return;
  d.x = e.clientX; d.y = e.clientY;

  if (pointers.size >= 2 && pinch) {
    // 핀치 확대/축소
    const p = [...pointers.values()];
    const nd = dist(p[0], p[1]);
    const nm = mid(p[0], p[1]);
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    const newScale = clamp(scale * (nd / pinch.dist), 1, MAX_SCALE);
    tx += (nm.x - (vw / 2 + tx)) * (1 - newScale / scale);
    ty += (nm.y - (vh / 2 + ty)) * (1 - newScale / scale);
    tx += (nm.x - pinch.mid.x);
    ty += (nm.y - pinch.mid.y);
    scale = newScale;
    pinch.dist = nd; pinch.mid = nm;
    clampPan(); applyZoom(false);
  } else if (pointers.size === 1) {
    if (scale > 1 && panStart) {
      tx = panStart.tx + (e.clientX - panStart.x);
      ty = panStart.ty + (e.clientY - panStart.y);
      clampPan(); applyZoom(false);
    } else if (swiping) {
      dragDX = e.clientX - startX;
      if ((index === 0 && dragDX > 0) || (index === PAGE_COUNT - 1 && dragDX < 0)) dragDX *= 0.55;
      setTransform(false);
    }
  }
});

function onPointerUp(e) {
  const d = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);

  // 탭(거의 안 움직였고 빠르게 뗌)
  if (d) {
    const moved = Math.hypot(d.x - d.downX, d.y - d.downY);
    const dt = performance.now() - d.downT;
    if (moved < 12 && dt < 300 && pointers.size === 0) {
      const w = viewport.clientWidth;
      const edge = (d.x < w * 0.25) ? -1 : (d.x > w * 0.75) ? 1 : 0;
      // 양 끝을 톡 → 페이지 넘김 (확대 중이거나 안내 닫는 탭은 제외)
      if (edge !== 0 && scale === 1 && !d.introOpen) {
        goTo(index + edge); swiping = false; return;
      }
      // 가운데를 두 번 톡 → 확대
      const now = performance.now();
      if (now - lastTap < 320 && Math.hypot(d.x - lastTapX, d.y - lastTapY) < 40) {
        toggleZoom(d.x, d.y); lastTap = 0;
        swiping = false; return;
      } else { lastTap = now; lastTapX = d.x; lastTapY = d.y; }
    }
  }

  if (pointers.size === 1 && pinch) {
    // 두 손가락 → 한 손가락: 이동 기준 다시 잡기
    pinch = null;
    const p = [...pointers.values()][0];
    panStart = (scale > 1) ? { x: p.x, y: p.y, tx, ty } : null;
    swiping = false;
    return;
  }

  if (pointers.size === 0) {
    if (pinch) { pinch = null; }
    if (swiping) {
      swiping = false;
      const w = viewport.clientWidth;
      const threshold = Math.min(w * 0.18, 90);
      if (dragDX <= -threshold) goTo(index + 1);
      else if (dragDX >= threshold) goTo(index - 1);
      else goTo(index);
    } else if (scale > 1) {
      clampPan(); applyZoom(true);
    } else {
      resetZoom(true);
    }
    panStart = null;
  }
}
viewport.addEventListener("pointerup", onPointerUp);
viewport.addEventListener("pointercancel", onPointerUp);

/* ---------- 마우스 휠 / 트랙패드 ---------- */
let wheelLock = false;
viewport.addEventListener("wheel", (e) => {
  // Ctrl(또는 ⌘)+휠 = 확대 (데스크톱)
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    const newScale = clamp(scale * (e.deltaY < 0 ? 1.15 : 0.87), 1, MAX_SCALE);
    tx += (e.clientX - (vw / 2 + tx)) * (1 - newScale / scale);
    ty += (e.clientY - (vh / 2 + ty)) * (1 - newScale / scale);
    scale = newScale;
    if (scale === 1) { tx = 0; ty = 0; }
    clampPan(); applyZoom(false);
    return;
  }
  e.preventDefault();
  if (scale > 1) return;          // 확대 중엔 페이지 안 넘김
  if (wheelLock) return;
  const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
  if (Math.abs(delta) < 8) return;
  hideIntro();
  goTo(index + (delta > 0 ? 1 : -1));
  wheelLock = true;
  setTimeout(() => { wheelLock = false; }, 420);
}, { passive: false });

/* ---------- 키보드 ---------- */
window.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { hideIntro(); goTo(index + 1); }
  if (e.key === "ArrowLeft"  || e.key === "ArrowUp")   { hideIntro(); goTo(index - 1); }
  if (e.key === "Escape") { resetZoom(true); }
});

/* ---------- 버튼 ---------- */
prevBtn.addEventListener("click", () => { hideIntro(); goTo(index - 1); });
nextBtn.addEventListener("click", () => { hideIntro(); goTo(index + 1); });

/* ---------- 창 크기 변경 ---------- */
window.addEventListener("resize", () => { resetZoom(false); setTransform(false); });
window.addEventListener("orientationchange", () => setTimeout(() => { resetZoom(false); setTransform(false); }, 100));

/* ---------- 첫 화면 안내 ---------- */
let introHidden = false;
function hideIntro() {
  if (introHidden) return;
  introHidden = true;
  intro.classList.add("hide");
}
intro.addEventListener("click", hideIntro);   // 화면을 누르면 사라짐(자동 사라짐 없음)

/* ---------- 시작 ---------- */
update();
setTransform(false);
</script>
</body>
</html>
